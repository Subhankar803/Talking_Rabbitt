<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Upload dataset — Talking Rabbitt</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@2.47.0/tabler-icons.min.css">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/css/style.css?v=1.1.0">
<link rel="stylesheet" href="/css/dashboard.css">
</head>
<body>
<div class="app-shell">
  <div id="sidebar-mount"></div>

  <div class="main">
    <div class="topbar">
      <div>
        <div class="topbar-title">Upload dataset</div>
        <div class="topbar-sub">CSV or Excel — cleaned and analyzed automatically</div>
      </div>
      <div class="dataset-pill" data-dataset-pill></div>
    </div>

    <div class="content">
      <div id="dropzone" class="dropzone" style="margin-bottom:16px">
        <i class="ti ti-cloud-upload"></i>
        <div class="dz-title">Drop your file here, or click to browse</div>
        <div class="dz-sub">Supports .csv, .xlsx, .xls — up to 25MB</div>
      </div>
      <input type="file" id="file-input" accept=".csv,.xlsx,.xls" style="display:none">

      <div id="upload-status" style="margin-bottom:20px; font-size:13px; color:var(--text-secondary)"></div>
      <div id="upload-result"></div>
    </div>
  </div>
</div>

<script src="/js/app.js"></script>
<script src="/js/upload.js"></script>
</body>
</html>
