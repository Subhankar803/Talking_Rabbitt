<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Executive report — Talking Rabbitt</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@2.47.0/tabler-icons.min.css">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/css/style.css?v=1.1.0">
<link rel="stylesheet" href="/css/dashboard.css">
</head>
<body>
<div class="app-shell">
  <div id="sidebar-mount"></div>

  <div class="main">
    <div class="topbar">
      <div>
        <div class="topbar-title">Executive report</div>
        <div class="topbar-sub">Business health, risks, and recommended actions</div>
      </div>
      <div class="dataset-pill" data-dataset-pill></div>
    </div>

    <div class="content" data-requires-dataset>
      <div id="report-content" style="margin-bottom:28px">
        <div class="skeleton" style="height:140px; margin-bottom:16px"></div>
      </div>

      <div class="section-title">Recommendations</div>
      <div id="recommendations-content"></div>
    </div>
  </div>
</div>

<script src="/js/app.js"></script>
<script src="/js/report.js"></script>
</body>
</html>
